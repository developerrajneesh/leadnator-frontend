<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/leadnator_logo.png" />
    <link rel="apple-touch-icon" href="/leadnator_logo.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#7c3aed" />

    <!-- PWA theme — controls Android address-bar + iOS status-bar color -->
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- iOS Safari PWA support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Leadnator" />

    <!-- Windows tile color -->
    <meta name="msapplication-TileColor" content="#7c3aed" />

    <!-- Core SEO -->
    <title>Leadnator — AI-Powered Growth CRM for WhatsApp, Meta Ads & Email</title>
    <meta name="description" content="All-in-one AI-powered growth CRM. Run WhatsApp Cloud API campaigns, Meta Ads, email marketing, lead pipelines and AI automations from one login." />
    <meta name="keywords" content="CRM, WhatsApp Business API, Meta Ads, Email Marketing, lead management, AI automation, WhatsApp chatbot, marketing platform India" />
    <meta name="author" content="Leadnator" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://leadnator.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Leadnator — AI Growth Platform" />
    <meta property="og:description" content="Run WhatsApp campaigns, Meta Ads, Email marketing and your whole CRM from one login." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://leadnator.com/" />
    <meta property="og:site_name" content="Leadnator" />
    <meta property="og:image" content="https://leadnator.com/hero_dashboard.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Leadnator — AI Growth Platform" />
    <meta name="twitter:description" content="Run WhatsApp campaigns, Meta Ads, Email marketing and your whole CRM from one login." />
    <meta name="twitter:image" content="https://leadnator.com/hero_dashboard.png" />

    <!-- Preconnect hot origins to shave ~100ms off first request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" />

    <!-- Structured data — Organization. Helps Google show a knowledge panel,
         logo, and social profiles for brand searches. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Leadnator",
      "url": "https://leadnator.com",
      "logo": "https://leadnator.com/leadnator_logo.png",
      "description": "All-in-one AI-powered growth CRM for WhatsApp, Meta Ads, Email and lead management.",
      "foundingDate": "2024",
      "sameAs": [
        "https://twitter.com/leadnator",
        "https://www.linkedin.com/company/leadnator",
        "https://www.facebook.com/leadnator",
        "https://www.instagram.com/leadnator"
      ],
      "contactPoint": [{
        "@type": "ContactPoint",
        "telephone": "+91-9594-686-906",
        "contactType": "customer support",
        "areaServed": ["IN", "SG", "AE", "US"],
        "availableLanguage": ["English", "Hindi"]
      }]
    }
    </script>

    <!-- Structured data — SoftwareApplication. Makes the app itself
         eligible for software rich results + app-rating snippets. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Leadnator",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android, Windows, macOS",
      "url": "https://leadnator.com",
      "description": "AI-powered growth CRM with WhatsApp Cloud API, Meta Ads, Email Marketing, lead pipelines, storage, calendar and AI Studio — all from one login.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1240"
      }
    }
    </script>

    <!-- Structured data — WebSite with SearchAction. Lets Google show a
         sitelinks search box on brand SERPs. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Leadnator",
      "url": "https://leadnator.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://leadnator.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="module" crossorigin src="/assets/index-eJqKznLY.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D9c7Kn62.css">
  <link rel="manifest" href="/manifest.webmanifest"></head>
  <body>
    <div id="root"></div>
  </body>
</html>
